name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.25"

jobs:
  go:
    name: Go build, vet, gofmt, staticcheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: gofmt (fail on diff)
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: staticcheck
        run: staticcheck ./...

      - name: go test
        run: go test ./...

  shellcheck:
    name: shellcheck packaging scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck -s sh packaging/*.sh

  goreleaser-snapshot:
    name: goreleaser snapshot (release build dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: goreleaser snapshot
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean

  systemd-security:
    name: systemd-analyze security (advisory)
    runs-on: ubuntu-latest
    # Advisory only — don't hard-fail CI if systemd tooling is unavailable on the runner.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: install unit and run systemd-analyze security
        run: |
          sudo apt-get update
          sudo apt-get install -y systemd
          sudo install -m 0644 packaging/systemd/dokploy-sentinel.service \
            /etc/systemd/system/dokploy-sentinel.service
          sudo install -m 0644 packaging/systemd/dokploy-sentinel-failure.service \
            /etc/systemd/system/dokploy-sentinel-failure.service
          sudo systemctl daemon-reload || true
          systemd-analyze security dokploy-sentinel.service || true
